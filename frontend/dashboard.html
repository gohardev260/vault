<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault — Dashboard</title>
    <link rel="stylesheet" href="css/style.css?v=2.1">
</head>
<body>
    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <div class="page-dashboard-sidebar">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <span class="brand-text">Vault</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="sidebar-tab active" data-tab="passwords">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <span class="nav-text">Passwords</span>
                </button>
                <button class="sidebar-tab" data-tab="profile">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span class="nav-text">Profile</span>
                </button>
            </nav>
        </aside>

        <!-- Main Dashboard View -->
        <main class="main-viewport">
            <!-- Passwords Panel -->
            <div class="panel active" id="panel-passwords">
                <div class="viewport-header">
                    <h2>Passwords</h2>
                    <div class="viewport-actions">
                        <button class="btn btn-primary" id="add-pw-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            <span>Add Password</span>
                        </button>
                        <button class="btn-icon logout-btn" title="Sign Out">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                <polyline points="16 17 21 12 16 7"></polyline>
                                <line x1="21" y1="12" x2="9" y2="12"></line>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="search-wrap">
                    <input type="text" class="field-input search-field" id="search-input" placeholder="Search accounts...">
                </div>

                <div class="table-card">
                    <div class="table-responsive">
                        <table class="db-table">
                            <thead>
                                <tr>
                                    <th>Account Name</th>
                                    <th>Username / Email</th>
                                    <th>Password</th>
                                    <th>Updated</th>
                                    <th class="text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="pw-table-body">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Profile Panel -->
            <div class="panel" id="panel-profile">
                <div class="viewport-header">
                    <h2>Profile</h2>
                    <button class="btn-icon logout-btn" title="Sign Out">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
                <div class="profile-container">
                    <div class="card profile-card">
                        <div class="profile-info-section">
                            <span class="profile-info-label">Account Email</span>
                            <div class="profile-info-email" id="user-email">...</div>
                        </div>

                        <hr class="profile-divider">

                        <h3>Change Master Password</h3>
                        <form id="change-pw-form">
                            <div class="field">
                                <label for="cur-pw" class="field-label">Current Password</label>
                                <div class="field-input-wrap">
                                    <input type="password" id="cur-pw" class="field-input field-input-padded" required>
                                    <button type="button" class="input-action-btn toggle-settings-pw" data-target="cur-pw" aria-label="Toggle password visibility">
                                        <svg class="eye-icon eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                                            <circle cx="12" cy="12" r="3"></circle>
                                        </svg>
                                        <svg class="eye-icon eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                                            <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                                            <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
                                            <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
                                            <line x1="2" y1="2" x2="22" y2="22"></line>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div class="field">
                                <label for="new-pw" class="field-label">New Password</label>
                                <div class="field-input-wrap">
                                    <input type="password" id="new-pw" class="field-input field-input-padded" required minlength="8">
                                    <button type="button" class="input-action-btn toggle-settings-pw" data-target="new-pw" aria-label="Toggle password visibility">
                                        <svg class="eye-icon eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                                            <circle cx="12" cy="12" r="3"></circle>
                                        </svg>
                                        <svg class="eye-icon eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                                            <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                                            <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
                                            <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
                                            <line x1="2" y1="2" x2="22" y2="22"></line>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div class="field">
                                <label for="confirm-pw" class="field-label">Confirm New Password</label>
                                <div class="field-input-wrap">
                                    <input type="password" id="confirm-pw" class="field-input field-input-padded" required>
                                    <button type="button" class="input-action-btn toggle-settings-pw" data-target="confirm-pw" aria-label="Toggle password visibility">
                                        <svg class="eye-icon eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                                            <circle cx="12" cy="12" r="3"></circle>
                                        </svg>
                                        <svg class="eye-icon eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                                            <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                                            <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
                                            <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
                                            <line x1="2" y1="2" x2="22" y2="22"></line>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-full" id="settings-submit">Update Password</button>
                        </form>

                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Credentials Modal -->
    <div class="modal-overlay" id="pw-modal">
        <div class="modal-wrapper">
            <div class="modal-card">
                <div class="modal-header">
                    <h3 id="form-title">Add Password</h3>
                    <button type="button" class="btn-icon" id="close-modal-btn" aria-label="Close Modal">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <form id="pw-form">
                    <input type="hidden" id="edit-id">

                    <div class="field">
                        <label for="account-name" class="field-label">Account Name</label>
                        <input type="text" id="account-name" class="field-input" placeholder="e.g. GitHub, Google, Netflix" required>
                    </div>

                    <div class="field">
                        <label for="account-username" class="field-label">Username / Email</label>
                        <input type="text" id="account-username" class="field-input" placeholder="e.g. you@example.com, myusername">
                    </div>

                    <div class="field">
                        <label for="account-pw" class="field-label">Password</label>
                        <div class="input-row">
                            <div class="field-input-wrap">
                                <input type="password" id="account-pw" class="field-input field-input-padded" placeholder="Enter or generate" required>
                                <button type="button" class="input-action-btn" id="toggle-pw-vis" aria-label="Toggle password visibility">
                                    <svg class="eye-icon" id="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                    <svg class="eye-icon" id="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                                        <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                                        <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
                                        <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
                                        <line x1="2" y1="2" x2="22" y2="22"></line>
                                    </svg>
                                </button>
                            </div>
                            <button type="button" class="btn btn-sm" id="fill-gen-btn">Generate</button>
                        </div>
                    </div>

                    <!-- Generator Options -->
                    <div class="gen-box" id="gen-section">
                        <h4>Password Options</h4>

                        <div class="gen-row">
                            <label for="gen-len">Length</label>
                            <input type="range" id="gen-len" min="8" max="64" value="16">
                            <span class="gen-val" id="gen-len-val">16</span>
                        </div>

                        <div class="gen-checks">
                            <label class="check-row">
                                <span>Uppercase (A-Z)</span>
                                <input type="checkbox" id="gen-upper" checked>
                            </label>
                            <label class="check-row">
                                <span>Lowercase (a-z)</span>
                                <input type="checkbox" id="gen-lower" checked>
                            </label>
                            <label class="check-row">
                                <span>Numbers (0-9)</span>
                                <input type="checkbox" id="gen-nums" checked>
                            </label>
                            <label class="check-row">
                                <span>Special Symbols (!@#)</span>
                                <input type="checkbox" id="gen-syms" checked>
                            </label>
                        </div>

                        <div class="strength-row">
                            <div class="strength-track"><div class="strength-fill" id="strength-fill"></div></div>
                            <span class="strength-label" id="strength-label">Strong</span>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="save-btn">Save</button>
                        <button type="button" class="btn" id="cancel-btn">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
        </div>
    </div>

    <script src="js/app.js?v=2.1"></script>
</body>
</html>
