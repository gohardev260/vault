<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault — Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <div class="page-dashboard">
        <!-- Header -->
        <header class="header">
            <div class="header-inner">
                <div class="logo">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <span>Vault</span>
                </div>
                <div class="header-right">
                    <div class="profile-wrap">
                        <button class="profile-btn" id="profile-trigger" aria-label="User Profile">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </button>
                        <div class="profile-dropdown" id="profile-dropdown">
                            <div class="profile-email" id="user-email">...</div>
                            <button class="dropdown-item" id="logout-btn">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                    <polyline points="16 17 21 12 16 7"></polyline>
                                    <line x1="21" y1="12" x2="9" y2="12"></line>
                                </svg>
                                Sign out
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <nav class="tabs">
            <button class="tab active" data-tab="passwords">Passwords</button>
            <button class="tab" data-tab="settings">Settings</button>
        </nav>

        <!-- Passwords Panel -->
        <div class="panel active" id="panel-passwords">
            <div class="dashboard-grid">
                <!-- Left: Password List -->
                <div class="list-col">
                    <div class="list-search">
                        <input type="text" class="field-input" id="search-input" placeholder="Search accounts...">
                    </div>
                    <div class="list-scroll" id="pw-list">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Right: Form -->
                <div class="form-col">
                    <div class="form-wrap">
                        <h2 id="form-title">Add Password</h2>

                        <form id="pw-form">
                            <input type="hidden" id="edit-id">

                            <div class="field">
                                <label for="account-name" class="field-label">Account Name</label>
                                <input type="text" id="account-name" class="field-input" placeholder="e.g. GitHub, Google, Netflix" required>
                            </div>

                            <div class="field">
                                <label for="account-pw" class="field-label">Password</label>
                                <div class="input-row">
                                    <div class="field-input-wrap">
                                        <input type="password" id="account-pw" class="field-input field-input-padded" placeholder="Enter or generate" required>
                                        <button type="button" class="input-action-btn" id="toggle-pw-vis" aria-label="Toggle password visibility">
                                            <svg class="eye-icon" id="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                                                <circle cx="12" cy="12" r="3"></circle>
                                            </svg>
                                            <svg class="eye-icon" id="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                                                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                                                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
                                                <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
                                                <line x1="2" y1="2" x2="22" y2="22"></line>
                                            </svg>
                                        </button>
                                    </div>
                                    <button type="button" class="btn btn-sm" id="fill-gen-btn">Generate</button>
                                </div>
                            </div>

                            <!-- Generator Options -->
                            <div class="gen-box" id="gen-section">
                                <h4>Password Options</h4>

                                <div class="gen-row">
                                    <label for="gen-len">Length</label>
                                    <input type="range" id="gen-len" min="8" max="64" value="16">
                                    <span class="gen-val" id="gen-len-val">16</span>
                                </div>

                                <div class="gen-checks">
                                    <label class="check-row">
                                        <span>Uppercase (A-Z)</span>
                                        <input type="checkbox" id="gen-upper" checked>
                                    </label>
                                    <label class="check-row">
                                        <span>Lowercase (a-z)</span>
                                        <input type="checkbox" id="gen-lower" checked>
                                    </label>
                                    <label class="check-row">
                                        <span>Numbers (0-9)</span>
                                        <input type="checkbox" id="gen-nums" checked>
                                    </label>
                                    <label class="check-row">
                                        <span>Special Symbols (!@#)</span>
                                        <input type="checkbox" id="gen-syms" checked>
                                    </label>
                                </div>

                                <div class="strength-row">
                                    <div class="strength-track"><div class="strength-fill" id="strength-fill"></div></div>
                                    <span class="strength-label" id="strength-label">Strong</span>
                                </div>
                            </div>

                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary" id="save-btn">Save</button>
                                <button type="button" class="btn" id="cancel-btn" style="display:none">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings Panel -->
        <div class="panel" id="panel-settings">
            <div class="settings-wrap">
                <div class="card settings-card">
                    <h2>Change Master Password</h2>
                    <form id="change-pw-form">
                        <div class="field">
                            <label for="cur-pw" class="field-label">Current Password</label>
                            <input type="password" id="cur-pw" class="field-input" required>
                        </div>
                        <div class="field">
                            <label for="new-pw" class="field-label">New Password</label>
                            <input type="password" id="new-pw" class="field-input" required minlength="8">
                        </div>
                        <div class="field">
                            <label for="confirm-pw" class="field-label">Confirm New Password</label>
                            <input type="password" id="confirm-pw" class="field-input" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full" id="settings-submit">Update Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
