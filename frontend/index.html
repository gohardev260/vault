<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault — Password Manager</title>
    <link rel="stylesheet" href="css/style.css?v=2.1">
</head>
<body>
    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <div class="page-landing-simple">
        <!-- Header -->
        <header class="header">
            <div class="header-inner">
                <div class="logo" onclick="window.location.reload()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <span>Vault</span>
                </div>
                <button class="btn btn-sm" id="header-cta-btn">Create Account</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="landing-main-simple">
            <div class="auth-card-wrap">
                <div class="card auth-card">
                    <div class="auth-header">
                        <h2 id="auth-title">Sign in</h2>
                        <p id="auth-subtitle">Enter your master credentials to open your vault.</p>
                    </div>

                    <form id="auth-form">
                        <div class="field">
                            <label for="email" class="field-label">Email Address</label>
                            <input type="email" id="email" class="field-input" placeholder="you@example.com" required autocomplete="email">
                        </div>

                        <div class="field">
                            <label for="password" class="field-label">Master Password</label>
                            <div class="field-input-wrap">
                                <input type="password" id="password" class="field-input field-input-padded" placeholder="Enter master password" required minlength="8" autocomplete="current-password">
                                <button type="button" class="input-action-btn" id="pw-toggle" aria-label="Toggle password visibility">
                                    <svg class="eye-icon" id="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                    <svg class="eye-icon" id="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                                        <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                                        <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
                                        <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
                                        <line x1="2" y1="2" x2="22" y2="22"></line>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-full" id="auth-submit">Sign in</button>
                    </form>

                    <div class="auth-toggle">
                        <span id="toggle-text">No account yet?</span>
                        <a href="#" id="toggle-link">Create one</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        /* ---------- Elements ---------- */
        const form           = document.getElementById('auth-form');
        const title          = document.getElementById('auth-title');
        const subtitle       = document.getElementById('auth-subtitle');
        const submitBtn      = document.getElementById('auth-submit');
        const toggleText     = document.getElementById('toggle-text');
        const toggleLink     = document.getElementById('toggle-link');
        const headerCtaBtn   = document.getElementById('header-cta-btn');
        const pwInput        = document.getElementById('password');
        const pwToggle       = document.getElementById('pw-toggle');
        const eyeOpen        = document.getElementById('eye-open');
        const eyeClosed      = document.getElementById('eye-closed');
        const toastContainer = document.getElementById('toast-container');

        let mode = 'login';

        /* ---------- Auth Mode Toggle ---------- */
        function setAuthMode(newMode) {
            mode = newMode;
            if (mode === 'register') {
                title.textContent = 'Create account';
                subtitle.textContent = 'Set up a master password to secure your personal vault.';
                submitBtn.textContent = 'Create account';
                toggleText.textContent = 'Have an account?';
                toggleLink.textContent = 'Sign in';
                headerCtaBtn.textContent = 'Sign in';
            } else {
                title.textContent = 'Sign in';
                subtitle.textContent = 'Enter your master credentials to open your vault.';
                submitBtn.textContent = 'Sign in';
                toggleText.textContent = 'No account yet?';
                toggleLink.textContent = 'Create one';
                headerCtaBtn.textContent = 'Create Account';
            }
        }

        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            setAuthMode(mode === 'login' ? 'register' : 'login');
        });

        headerCtaBtn.addEventListener('click', () => {
            setAuthMode(mode === 'login' ? 'register' : 'login');
        });

        /* ---------- Password Visibility ---------- */
        pwToggle.addEventListener('click', () => {
            const isHidden = pwInput.type === 'password';
            pwInput.type = isHidden ? 'text' : 'password';
            eyeOpen.style.display = isHidden ? 'none' : 'block';
            eyeClosed.style.display = isHidden ? 'block' : 'none';
        });

        /* ---------- Form Submit ---------- */
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            const originalText = submitBtn.textContent;
            submitBtn.textContent = mode === 'login' ? 'Signing in...' : 'Creating account...';

            const email = document.getElementById('email').value.trim();
            const password = pwInput.value;

            try {
                const url = mode === 'login' ? '/api/auth/login' : '/api/auth/register';
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Authentication failed. Please verify your entries.');
                }

                showToast(
                    mode === 'login' ? 'Welcome Back' : 'Account Created',
                    mode === 'login' ? 'Accessing vault dashboard...' : 'Initializing your new vault...',
                    'success'
                );

                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 1000);
            } catch (err) {
                showToast('Authentication Error', err.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        /* ---------- Toast (no animation) ---------- */
        function showToast(title, desc, type) {
            const toast = document.createElement('div');
            toast.className = 'toast';

            let iconSvg = '';
            if (type === 'success') {
                iconSvg = `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            } else if (type === 'error') {
                iconSvg = `<svg class="toast-icon toast-icon-error" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;
            } else {
                iconSvg = `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
            }

            toast.innerHTML = `
                ${iconSvg}
                <div class="toast-body">
                    <div class="toast-title">${title}</div>
                    <div class="toast-desc">${desc}</div>
                </div>
                <button class="toast-close" aria-label="Close">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            `;

            toastContainer.appendChild(toast);

            const dismiss = () => { toast.remove(); };
            setTimeout(dismiss, 4000);
            toast.querySelector('.toast-close').addEventListener('click', dismiss);
        }
    </script>
</body>
</html>
