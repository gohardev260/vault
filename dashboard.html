<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<div class="setup-overlay" id="setup-modal">
    <div class="setup-card">
        <div class="setup-header"><h3>Connect Supabase</h3></div>
        <p class="modal-subtitle">Enter your project credentials. Stored locally in your browser only.</p>
        <form id="setup-form">
            <div class="field">
                <label for="setup-url" class="field-label">Project URL</label>
                <input type="url" id="setup-url" class="field-input" placeholder="https://your-project.supabase.co" required>
            </div>
            <div class="field">
                <label for="setup-key" class="field-label">Anon Key</label>
                <input type="text" id="setup-key" class="field-input" placeholder="your-public-anon-key" required>
            </div>
            <button type="submit" class="btn-primary btn-full">Connect</button>
        </form>
    </div>
</div>

<div class="app-layout">

    <!-- Sidebar — Grok style: fixed 260px, logo top, nav middle, logout bottom -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span>Vault</span>
        </div>

        <nav class="sidebar-nav">
            <button class="sidebar-tab active" data-tab="passwords">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <span>Passwords</span>
            </button>
            <button class="sidebar-tab" data-tab="profile">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>Settings</span>
            </button>
        </nav>

        <div class="sidebar-bottom">
            <button class="logout-btn" title="Sign Out">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Sign out</span>
            </button>
        </div>
    </aside>

    <!-- Main -->
    <main class="main-content">

        <!-- Passwords Panel -->
        <div class="panel active" id="panel-passwords">
            <div class="main-header">
                <h1 class="page-title">Passwords</h1>
                <button class="btn-primary" id="add-pw-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add
                </button>
            </div>

            <div class="search-bar">
                <input type="text" class="field-input" id="search-input" placeholder="Search…">
            </div>

            <div class="table-wrap">
                <table class="password-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Username</th>
                            <th>Password</th>
                            <th>Updated</th>
                            <th class="text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="pw-table-body"></tbody>
                </table>
            </div>
        </div>

        <!-- Profile Panel -->
        <div class="panel" id="panel-profile">
            <div class="main-header">
                <h1 class="page-title">Settings</h1>
            </div>
            <div class="profile-section">
                <div class="profile-email-box">
                    Signed in as <strong id="user-email">…</strong>
                </div>

                <h3>Change master password</h3>
                <form id="change-pw-form">
                    <div class="field">
                        <label for="cur-pw" class="field-label">Current password</label>
                        <div class="field-input-wrap">
                            <input type="password" id="cur-pw" class="field-input field-input-padded" required autocomplete="current-password">
                            <button type="button" class="input-action-btn toggle-settings-pw" data-target="cur-pw" aria-label="Toggle visibility">
                                <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="field">
                        <label for="new-pw" class="field-label">New password</label>
                        <div class="field-input-wrap">
                            <input type="password" id="new-pw" class="field-input field-input-padded" required minlength="8" autocomplete="new-password">
                            <button type="button" class="input-action-btn toggle-settings-pw" data-target="new-pw" aria-label="Toggle visibility">
                                <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="field">
                        <label for="confirm-pw" class="field-label">Confirm new password</label>
                        <div class="field-input-wrap">
                            <input type="password" id="confirm-pw" class="field-input field-input-padded" required autocomplete="new-password">
                            <button type="button" class="input-action-btn toggle-settings-pw" data-target="confirm-pw" aria-label="Toggle visibility">
                                <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary btn-full" id="settings-submit">Update password</button>
                </form>
            </div>
        </div>
    </main>
</div>

<!-- Add/Edit Password Modal -->
<div class="modal" id="pw-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="form-title">Add Password</h3>
            <button type="button" class="btn-icon" id="close-modal-btn" aria-label="Close">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <form id="pw-form">
            <input type="hidden" id="edit-id">
            <div class="field">
                <label for="account-name" class="field-label">Account name</label>
                <input type="text" id="account-name" class="field-input" placeholder="GitHub, Google, Netflix…" required>
            </div>
            <div class="field">
                <label for="account-username" class="field-label">Username / email</label>
                <input type="text" id="account-username" class="field-input" placeholder="you@example.com">
            </div>
            <div class="field">
                <label for="account-pw" class="field-label">Password</label>
                <div class="input-row">
                    <div class="field-input-wrap">
                        <input type="password" id="account-pw" class="field-input field-input-padded" placeholder="Enter or generate" required autocomplete="new-password">
                        <button type="button" class="input-action-btn" id="toggle-pw-vis" aria-label="Toggle visibility">
                            <svg id="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg id="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
                        </button>
                    </div>
                    <button type="button" class="btn-secondary" id="fill-gen-btn">Generate</button>
                </div>
            </div>
            <div class="gen-box" id="gen-section" style="display:none;">
                <h4>Generator options</h4>
                <div class="gen-row">
                    <label for="gen-len">Length</label>
                    <input type="range" id="gen-len" min="8" max="64" value="16">
                    <span class="gen-val" id="gen-len-val">16</span>
                </div>
                <div class="gen-checks">
                    <label class="check-row"><span>Uppercase (A–Z)</span><input type="checkbox" id="gen-upper" checked></label>
                    <label class="check-row"><span>Lowercase (a–z)</span><input type="checkbox" id="gen-lower" checked></label>
                    <label class="check-row"><span>Numbers (0–9)</span><input type="checkbox" id="gen-nums" checked></label>
                    <label class="check-row"><span>Symbols (!@#)</span><input type="checkbox" id="gen-syms" checked></label>
                </div>
                <div class="strength-row">
                    <div class="strength-track"><div class="strength-fill" id="strength-fill"></div></div>
                    <span class="strength-label" id="strength-label">Strong</span>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-primary" id="save-btn">Save</button>
                <button type="button" class="btn-secondary" id="cancel-btn">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script src="js/app.js"></script>
<script>
document.querySelectorAll('.toggle-settings-pw').forEach(btn => {
    btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        if (!input) return;
        const h = input.type === 'password';
        input.type = h ? 'text' : 'password';
        const eo = btn.querySelector('.eye-open'), ec = btn.querySelector('.eye-closed');
        if (eo && ec) { eo.style.display = h ? 'none' : 'block'; ec.style.display = h ? 'block' : 'none'; }
    });
});
</script>
</body>
</html>
