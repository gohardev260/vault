<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Vault - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com?plugins=container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "danger": "#ef4444",
                        "background": "#0d0d0d",
                        "surface": "#151515",
                        "surface-variant": "#202020",
                        "primary": "#ffffff",
                        "on-primary": "#000000",
                        "text-primary": "#e8e8e8",
                        "text-secondary": "#a0a0a0",
                        "text-muted": "#666666",
                        "border-subtle": "#2a2a2a",
                    },
                    spacing: {
                        "sidebar-width": "260px",
                        "sidebar-collapsed": "72px",
                    }
                }
            }
        }
    </script>
    <style type="text/css">
        body {
            font-family: 'Inter', sans-serif;
        }

        .panel {
            display: none !important;
        }

        .panel.active {
            display: flex !important;
        }

        .modal {
            display: none !important;
        }

        .modal.active {
            display: flex !important;
        }

        .setup-overlay {
            display: none !important;
        }

        .setup-overlay.active {
            display: flex !important;
        }
    </style>
</head>

<body class="bg-background text-text-primary h-screen flex overflow-hidden">
    <div class="toast-container" id="toast-container"></div>

    <!-- Mobile Top Bar -->
    <header
        class="md:hidden fixed top-0 left-0 right-0 h-16 bg-surface border-b border-border-subtle flex items-center justify-between px-4 z-40">
        <div class="flex items-center gap-2">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round" class="text-primary">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <span class="font-bold text-lg">Vault</span>
        </div>
        <div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center text-xs font-semibold cursor-pointer"
            id="mobile-profile-trigger">
            <span id="mobile-avatar-display">U</span>
        </div>
    </header>

    <!-- Sidebar -->
    <aside
        class="hidden md:flex flex-col w-sidebar-collapsed lg:w-sidebar-width bg-surface border-r border-border-subtle h-full transition-all duration-300 z-50">
        <!-- Logo Section -->
        <div class="h-16 flex items-center px-6 gap-3">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round" class="text-primary">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <span class="font-bold text-xl lg:block hidden">Vault</span>
        </div>
        <!-- Navigation -->
        <nav class="sidebar-nav flex-1 py-4 px-3 space-y-1">
            <button
                class="sidebar-tab w-full flex items-center gap-3 px-3 py-2.5 rounded-lg bg-surface-variant text-primary transition-colors active"
                data-tab="passwords">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <span class="font-medium lg:block hidden">Passwords</span>
            </button>
        </nav>
        <!-- Profile Bottom -->
        <div class="p-4 border-t border-border-subtle">
            <div class="profile-trigger flex items-center gap-3 p-2 rounded-lg hover:bg-surface-variant cursor-pointer transition-colors"
                id="profile-menu-trigger">
                <div
                    class="avatar w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center font-semibold shrink-0">
                    U</div>
                <div class="lg:block hidden overflow-hidden">
                    <div class="text-sm font-medium truncate" id="profile-display-name">User</div>
                    <div class="text-xs text-text-muted truncate" id="profile-display-email">user@email.com</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Profile Popover Menu -->
    <div class="profile-popover" id="profile-popover-menu">
        <button class="popover-item" id="popover-settings-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z">
                </path>
            </svg>
            <span>Settings</span>
        </button>
        <button class="popover-item logout-btn" id="popover-logout-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            <span>Sign out</span>
        </button>
    </div>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 overflow-hidden mt-16 md:mt-0">
        <!-- Passwords Panel -->
        <div class="panel active flex-1 flex flex-col min-w-0 overflow-hidden" id="panel-passwords">
            <!-- Header -->
            <header
                class="h-16 lg:h-20 flex items-center justify-between px-4 lg:px-8 border-b border-border-subtle shrink-0">
                <h1 class="text-xl lg:text-2xl font-semibold">Passwords</h1>
                <button
                    class="bg-primary text-on-primary px-4 py-2 rounded-md font-medium flex items-center gap-2 hover:opacity-90 transition-opacity"
                    id="add-pw-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Add
                </button>
            </header>
            <!-- Content Area -->
            <div class="flex-1 overflow-y-auto p-4 lg:p-8">
                <div class="max-w-6xl mx-auto space-y-6">
                    <!-- Search -->
                    <div class="w-full md:w-[320px]">
                        <div class="relative">
                            <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-text-muted" width="16" height="16"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            <input
                                class="w-full bg-surface border border-border-subtle rounded-lg py-2 pl-10 pr-4 text-sm focus:outline-none focus:border-primary/50 transition-colors"
                                id="search-input" placeholder="Search..." type="text" />
                        </div>
                    </div>
                    <!-- Table Container -->
                    <div class="table-wrap bg-surface border border-border-subtle rounded-xl" id="table-container">
                        <table class="password-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Username</th>
                                    <th>Password</th>
                                    <th class="col-updated">Updated</th>
                                    <th class="text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="pw-table-body">
                                <!-- Dynamic Content -->
                            </tbody>
                        </table>
                    </div>
                    <div class="empty-state-box bg-surface border border-border-subtle rounded-xl"
                        id="empty-state-container" style="display: none;">
                        <div class="empty-state">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <span>No password records found. Click 'Add' to start.</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings Panel -->
        <div class="panel flex-1 flex flex-col min-w-0 overflow-hidden" id="panel-profile">
            <!-- Header -->
            <header class="h-16 lg:h-20 flex items-center gap-4 px-4 lg:px-8 border-b border-border-subtle shrink-0">
                <button class="btn-back p-2 rounded-full hover:bg-surface-variant flex items-center justify-center"
                    id="settings-back-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <h1 class="text-xl lg:text-2xl font-semibold">Settings</h1>
            </header>
            <!-- Content Area -->
            <div class="flex-1 overflow-y-auto p-4 lg:p-8">
                <div class="max-w-2xl mx-auto">
                    <div class="profile-section">
                        <!-- Signed in email box removed -->

                        <h3 class="font-bold text-lg mb-4">Change master password</h3>
                        <form id="change-pw-form">
                            <div class="field">
                                <label for="cur-pw" class="field-label">Current password</label>
                                <div class="field-input-wrap">
                                    <input type="password" id="cur-pw" class="field-input field-input-padded" required>
                                    <button class="input-action-btn toggle-settings-pw" data-target="cur-pw" type="button" aria-label="Toggle visibility">
                                        <svg fill="none" height="18" id="eye-open" stroke="currentColor" stroke-linecap="round"
                                            stroke-linejoin="round" stroke-width="1.5" viewbox="0 0 24 24" width="18">
                                            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                                            <circle cx="12" cy="12" r="3"></circle>
                                        </svg>
                                        <svg fill="none" height="18" id="eye-closed" stroke="currentColor"
                                            stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                            style="display:none" viewbox="0 0 24 24" width="18">
                                            <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                                            <path
                                                d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68">
                                            </path>
                                            <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61">
                                            </path>
                                            <line x1="2" x2="22" y1="2" y2="22"></line>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div class="field">
                                <label for="new-pw" class="field-label">New password</label>
                                <div class="field-input-wrap">
                                    <input type="password" id="new-pw" class="field-input field-input-padded" required minlength="8">
                                    <button class="input-action-btn toggle-settings-pw" data-target="new-pw" type="button" aria-label="Toggle visibility">
                                        <svg fill="none" height="18" id="eye-open" stroke="currentColor" stroke-linecap="round"
                                            stroke-linejoin="round" stroke-width="1.5" viewbox="0 0 24 24" width="18">
                                            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                                            <circle cx="12" cy="12" r="3"></circle>
                                        </svg>
                                        <svg fill="none" height="18" id="eye-closed" stroke="currentColor"
                                            stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                            style="display:none" viewbox="0 0 24 24" width="18">
                                            <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                                            <path
                                                d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68">
                                            </path>
                                            <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61">
                                            </path>
                                            <line x1="2" x2="22" y1="2" y2="22"></line>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div class="field">
                                <label for="confirm-pw" class="field-label">Confirm new password</label>
                                <div class="field-input-wrap">
                                    <input type="password" id="confirm-pw" class="field-input field-input-padded" required minlength="8">
                                    <button class="input-action-btn toggle-settings-pw" data-target="confirm-pw" type="button" aria-label="Toggle visibility">
                                        <svg fill="none" height="18" id="eye-open" stroke="currentColor" stroke-linecap="round"
                                            stroke-linejoin="round" stroke-width="1.5" viewbox="0 0 24 24" width="18">
                                            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                                            <circle cx="12" cy="12" r="3"></circle>
                                        </svg>
                                        <svg fill="none" height="18" id="eye-closed" stroke="currentColor"
                                            stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                            style="display:none" viewbox="0 0 24 24" width="18">
                                            <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                                            <path
                                                d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68">
                                            </path>
                                            <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61">
                                            </path>
                                            <line x1="2" x2="22" y1="2" y2="22"></line>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <button type="submit" class="btn-primary btn-full" id="settings-submit">Update
                                password</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Setup Modal (Legacy/Logic preserved) -->
    <div class="setup-overlay" id="setup-modal">
        <div class="setup-card">
            <div class="setup-header">
                <h3>Connect Supabase</h3>
            </div>
            <p class="modal-subtitle">Enter your project credentials. Stored locally in your browser only.</p>
            <form id="setup-form">
                <div class="field">
                    <label for="setup-url" class="field-label">Project URL</label>
                    <input type="url" id="setup-url" class="field-input" placeholder="https://your-project.supabase.co"
                        required>
                </div>
                <div class="field">
                    <label for="setup-key" class="field-label">Anon Key</label>
                    <input type="text" id="setup-key" class="field-input" placeholder="your-public-anon-key" required>
                </div>
                <button type="submit" class="btn-primary btn-full">Connect</button>
            </form>
        </div>
    </div>

    <!-- Add/Edit Password Modal -->
    <div class="modal" id="pw-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="form-title">Add Password</h3>
                <button class="btn-icon" id="close-modal-btn" type="button">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <form id="pw-form">
                <input id="edit-id" type="hidden" />
                <div class="field">
                    <label class="field-label" for="account-name">Account name</label>
                    <input class="field-input" id="account-name" placeholder="GitHub, Google, Netflix…" required=""
                        type="text" />
                </div>
                <div class="field">
                    <label class="field-label" for="account-username">Username / email</label>
                    <input class="field-input" id="account-username" placeholder="you@example.com" type="text" />
                </div>
                <div class="field">
                    <label class="field-label" for="account-pw">Password</label>
                    <div class="input-row">
                        <div class="field-input-wrap">
                            <input autocomplete="new-password" class="field-input field-input-padded" id="account-pw"
                                required="" type="password" />
                            <button class="input-action-btn" id="toggle-pw-vis" type="button"
                                aria-label="Toggle visibility">
                                <svg fill="none" height="18" id="eye-open" stroke="currentColor" stroke-linecap="round"
                                    stroke-linejoin="round" stroke-width="1.5" viewbox="0 0 24 24" width="18">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <svg fill="none" height="18" id="eye-closed" stroke="currentColor"
                                    stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    style="display:none" viewbox="0 0 24 24" width="18">
                                    <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                                    <path
                                        d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68">
                                    </path>
                                    <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61">
                                    </path>
                                    <line x1="2" x2="22" y1="2" y2="22"></line>
                                </svg>
                            </button>
                        </div>
                        <button class="btn-secondary" id="fill-gen-btn" type="button">Generate</button>
                    </div>
                </div>
                <div class="gen-box" id="gen-section" style="display: none;">
                    <div class="gen-row">
                        <label for="gen-len">Length</label>
                        <input type="range" id="gen-len" min="8" max="64" value="16">
                        <span class="gen-val" id="gen-len-val">16</span>
                    </div>
                    <div class="gen-checks">
                        <label class="check-row"><span>Uppercase (A–Z)</span><input type="checkbox" id="gen-upper"
                                checked></label>
                        <label class="check-row"><span>Lowercase (a–z)</span><input type="checkbox" id="gen-lower"
                                checked></label>
                        <label class="check-row"><span>Numbers (0–9)</span><input type="checkbox" id="gen-nums"
                                checked></label>
                        <label class="check-row"><span>Symbols (!@#)</span><input type="checkbox" id="gen-syms"
                                checked></label>
                    </div>
                    <div class="strength-row">
                        <div class="strength-track">
                            <div class="strength-fill" id="strength-fill"></div>
                        </div>
                        <span class="strength-label" id="strength-label">Strong</span>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn-primary" id="save-btn" type="submit">Save</button>
                    <button class="btn-secondary" id="cancel-btn" type="button">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Handle settings back button to trigger standard switchTab('passwords')
        document.getElementById('settings-back-btn').addEventListener('click', () => {
            const passTab = document.querySelector('.sidebar-tab[data-tab="passwords"]');
            if (passTab) passTab.click();
        });
    </script>
</body>

</html>
