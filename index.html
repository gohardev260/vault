<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Vault — Sign in</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com?plugins=container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;1,14..32,400&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "danger":       "#ee0000",
                        "background":   "#fafafa",
                        "surface":      "#f2f2f2",
                        "surface-variant": "#ebebeb",
                        "primary":      "#171717",
                        "on-primary":   "#ffffff",
                        "text-primary": "#171717",
                        "text-secondary": "#4d4d4d",
                        "text-muted":   "#8f8f8f",
                        "border-subtle": "#ebebeb",
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
</head>

<body class="auth-page">
    <div class="toast-container" id="toast-container"></div>
    
    <!-- Logo -->
    <div class="auth-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <span>Vault</span>
    </div>

    <!-- Auth Card -->
    <div class="auth-box">
        <h2 id="auth-title">Sign in</h2>
        <p class="auth-sub" id="auth-subtitle">Enter your master credentials to access your vault.</p>

        <form id="auth-form">
            <div class="field">
                <label class="field-label" for="email">Email</label>
                <input autocomplete="email" class="field-input" id="email" placeholder="you@example.com" required=""
                    type="email" />
            </div>

            <div class="field">
                <label class="field-label" for="password">Master Password</label>
                <div class="field-input-wrap">
                    <input autocomplete="current-password" class="field-input field-input-padded" id="password" minlength="8"
                        placeholder="••••••••" required="" type="password" />
                    <button class="input-action-btn" id="pw-toggle" type="button" aria-label="Toggle visibility" title="Show password">
                        <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg class="eye-closed" style="display:none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                            <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
                            <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
                            <line x1="2" y1="2" x2="22" y2="22"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <button class="btn-primary btn-full" id="auth-submit" type="submit">
                Sign in
            </button>
        </form>

        <div class="auth-footer">
            <span id="toggle-text">No account?</span>
            <a href="#" id="toggle-link">Create one</a>
        </div>
    </div>

    <script>
        let supabaseUrl = window.SUPABASE_URL;
        let supabaseKey = window.SUPABASE_PUBLISHABLE_KEY;
        if (!supabaseUrl || supabaseUrl === "YOUR_SUPABASE_URL" || !supabaseUrl.trim()) supabaseUrl = localStorage.getItem("vault_supabase_url");
        if (!supabaseKey || supabaseKey === "YOUR_SUPABASE_PUBLISHABLE_KEY" || !supabaseKey.trim()) {
            supabaseKey = localStorage.getItem("vault_supabase_publishable_key");
        }

        let client = null;

        function initSupabase() {
            if (supabaseUrl && supabaseKey && supabaseUrl !== "YOUR_SUPABASE_URL" && supabaseKey !== "YOUR_SUPABASE_PUBLISHABLE_KEY") {
                try { client = window.supabase.createClient(supabaseUrl, supabaseKey); return true; } catch (e) { console.error("Supabase init failed:", e); return false; }
            }
            return false;
        }

        if (initSupabase()) {
            client.auth.getSession().then(({ data: { session } }) => {
                if (session && localStorage.getItem('vault_key')) location.href = 'dashboard.html';
            });
        }

        const form = document.getElementById('auth-form');
        const titleEl = document.getElementById('auth-title');
        const subEl = document.getElementById('auth-subtitle');
        const submitBtn = document.getElementById('auth-submit');
        const toggleText = document.getElementById('toggle-text');
        const toggleLink = document.getElementById('toggle-link');
        const pwInput = document.getElementById('password');
        const pwToggle = document.getElementById('pw-toggle');
        const eyeOpen = document.getElementById('eye-open');
        const eyeClosed = document.getElementById('eye-closed');
        const toastContainer = document.getElementById('toast-container');
        let mode = 'login';

        function setMode(m) {
            mode = m;
            if (m === 'register') {
                titleEl.textContent = 'Create account';
                subEl.textContent = 'Set a master password to encrypt your vault.';
                submitBtn.textContent = 'Create account';
                toggleText.textContent = 'Have an account?';
                toggleLink.textContent = 'Sign in';
            } else {
                titleEl.textContent = 'Sign in';
                subEl.textContent = 'Enter your master credentials to access your vault.';
                submitBtn.textContent = 'Sign in';
                toggleText.textContent = 'No account?';
                toggleLink.textContent = 'Create one';
            }
        }
        toggleLink.addEventListener('click', e => { e.preventDefault(); setMode(mode === 'login' ? 'register' : 'login'); });

        if (pwToggle && eyeOpen && eyeClosed) {
            pwToggle.addEventListener('click', (e) => {
                e.preventDefault();
                const h = pwInput.type === 'password';
                pwInput.type = h ? 'text' : 'password';
                eyeOpen.style.display = h ? 'none' : 'inline-block';
                eyeClosed.style.display = h ? 'inline-block' : 'none';
            });
        }

        form.addEventListener('submit', async e => {
            e.preventDefault();
            if (!client) { showToast('Configuration Error', 'Please ensure Supabase credentials are set in config.js.', 'error'); return; }
            submitBtn.disabled = true;
            const orig = submitBtn.textContent;
            submitBtn.textContent = mode === 'login' ? 'Signing in…' : 'Creating account…';
            const email = document.getElementById('email').value.trim();
            const password = pwInput.value;
            try {
                if (mode === 'login') {
                    const { error } = await client.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    const key = await window.VaultCrypto.deriveKey(password, email);
                    localStorage.setItem('vault_key', await window.VaultCrypto.exportKeyToBase64(key));
                    showToast('Welcome back', 'Accessing your vault...', 'success');
                    setTimeout(() => location.href = 'dashboard.html', 600);
                } else {
                    const { data, error } = await client.auth.signUp({ email, password });
                    if (error) throw error;
                    if (data.session) {
                        const key = await window.VaultCrypto.deriveKey(password, email);
                        localStorage.setItem('vault_key', await window.VaultCrypto.exportKeyToBase64(key));
                        showToast('Success', 'Vault created. Redirecting...', 'success');
                        setTimeout(() => location.href = 'dashboard.html', 600);
                    } else {
                        showToast('Verification Required', 'Check your email to confirm your account.', 'success');
                        setMode('login'); submitBtn.disabled = false; submitBtn.textContent = orig;
                    }
                }
            } catch (err) {
                showToast('Authentication Error', err.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = orig;
            }
        });

        function showToast(title, desc, type) {
            const t = document.createElement('div'); t.className = 'toast';
            const ic = type === 'success' ? `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`
                : type === 'error' ? `<svg class="toast-icon toast-icon-error" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
                    : `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`;
            t.innerHTML = `${ic}<div class="toast-body"><div class="toast-title">${title}</div><div class="toast-desc">${desc}</div></div><button class="toast-close" aria-label="Close"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></button>`;
            toastContainer.appendChild(t);
            const d = () => { t.remove(); };
            setTimeout(d, 4000);
            t.querySelector('.toast-close').addEventListener('click', d);
        }
    </script>
</body>

</html>
