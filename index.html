<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<div class="setup-overlay" id="setup-modal">
    <div class="setup-card">
        <div class="setup-header"><h3>Connect Supabase</h3></div>
        <p class="modal-subtitle">Enter your project credentials. Stored locally in your browser only.</p>
        <form id="setup-form">
            <div class="field">
                <label for="setup-url" class="field-label">Project URL</label>
                <input type="url" id="setup-url" class="field-input" placeholder="https://your-project.supabase.co" required>
            </div>
            <div class="field">
                <label for="setup-key" class="field-label">Anon Key</label>
                <input type="text" id="setup-key" class="field-input" placeholder="your-public-anon-key" required>
            </div>
            <button type="submit" class="btn-primary btn-full">Connect</button>
        </form>
    </div>
</div>

<div class="auth-page">
    <div class="auth-logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span>Vault</span>
    </div>
    <div class="auth-box">
        <h2 id="auth-title">Sign in</h2>
        <p class="auth-sub" id="auth-subtitle">Enter your credentials to access your vault.</p>
        <form id="auth-form">
            <div class="field">
                <label for="email" class="field-label">Email</label>
                <input type="email" id="email" class="field-input" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="field">
                <label for="password" class="field-label">Master Password</label>
                <div class="field-input-wrap">
                    <input type="password" id="password" class="field-input field-input-padded" placeholder="••••••••" required minlength="8" autocomplete="current-password">
                    <button type="button" class="input-action-btn" id="pw-toggle" aria-label="Toggle visibility">
                        <svg id="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg id="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-primary btn-full" id="auth-submit">Sign in</button>
        </form>
        <div class="auth-footer">
            <span id="toggle-text">No account?</span>
            <a href="#" id="toggle-link">Create one</a>
        </div>
    </div>
</div>

<script>
let supabaseUrl = window.SUPABASE_URL, supabaseKey = window.SUPABASE_ANON_KEY;
if (!supabaseUrl || supabaseUrl === "YOUR_SUPABASE_URL" || !supabaseUrl.trim()) supabaseUrl = localStorage.getItem("vault_supabase_url");
if (!supabaseKey || supabaseKey === "YOUR_SUPABASE_ANON_KEY" || !supabaseKey.trim()) supabaseKey = localStorage.getItem("vault_supabase_anon_key");

let client = null;
const setupModal = document.getElementById('setup-modal');
const setupForm = document.getElementById('setup-form');

function initSupabase() {
    if (supabaseUrl && supabaseKey && supabaseUrl !== "YOUR_SUPABASE_URL" && supabaseKey !== "YOUR_SUPABASE_ANON_KEY") {
        try { client = window.supabase.createClient(supabaseUrl, supabaseKey); return true; } catch(e) { return false; }
    }
    return false;
}

if (!initSupabase()) {
    setupModal.classList.add('active');
    setupForm.addEventListener('submit', e => {
        e.preventDefault();
        localStorage.setItem("vault_supabase_url", document.getElementById('setup-url').value.trim());
        localStorage.setItem("vault_supabase_anon_key", document.getElementById('setup-key').value.trim());
        location.reload();
    });
} else {
    client.auth.getSession().then(({data:{session}}) => { if (session) location.href = 'dashboard.html'; });
}

const form = document.getElementById('auth-form');
const titleEl = document.getElementById('auth-title');
const subEl = document.getElementById('auth-subtitle');
const submitBtn = document.getElementById('auth-submit');
const toggleText = document.getElementById('toggle-text');
const toggleLink = document.getElementById('toggle-link');
const pwInput = document.getElementById('password');
const pwToggle = document.getElementById('pw-toggle');
const eyeOpen = document.getElementById('eye-open');
const eyeClosed = document.getElementById('eye-closed');
const toastContainer = document.getElementById('toast-container');
let mode = 'login';

function setMode(m) {
    mode = m;
    if (m === 'register') {
        titleEl.textContent = 'Create account';
        subEl.textContent = 'Set a master password to encrypt your vault.';
        submitBtn.textContent = 'Create account';
        toggleText.textContent = 'Have an account?';
        toggleLink.textContent = 'Sign in';
    } else {
        titleEl.textContent = 'Sign in';
        subEl.textContent = 'Enter your credentials to access your vault.';
        submitBtn.textContent = 'Sign in';
        toggleText.textContent = 'No account?';
        toggleLink.textContent = 'Create one';
    }
}
toggleLink.addEventListener('click', e => { e.preventDefault(); setMode(mode === 'login' ? 'register' : 'login'); });

pwToggle.addEventListener('click', () => {
    const h = pwInput.type === 'password';
    pwInput.type = h ? 'text' : 'password';
    eyeOpen.style.display = h ? 'none' : 'block';
    eyeClosed.style.display = h ? 'block' : 'none';
});

form.addEventListener('submit', async e => {
    e.preventDefault();
    if (!client) { showToast('Error', 'Supabase not configured.', 'error'); return; }
    submitBtn.disabled = true;
    const orig = submitBtn.textContent;
    submitBtn.textContent = mode === 'login' ? 'Signing in…' : 'Creating…';
    const email = document.getElementById('email').value.trim();
    const password = pwInput.value;
    try {
        if (mode === 'login') {
            const {error} = await client.auth.signInWithPassword({email, password});
            if (error) throw error;
            const key = await window.VaultCrypto.deriveKey(password, email);
            sessionStorage.setItem('vault_key', await window.VaultCrypto.exportKeyToBase64(key));
            showToast('Welcome', 'Redirecting…', 'success');
            setTimeout(() => location.href = 'dashboard.html', 600);
        } else {
            const {data, error} = await client.auth.signUp({email, password});
            if (error) throw error;
            if (data.session) {
                const key = await window.VaultCrypto.deriveKey(password, email);
                sessionStorage.setItem('vault_key', await window.VaultCrypto.exportKeyToBase64(key));
                showToast('Account created', 'Redirecting…', 'success');
                setTimeout(() => location.href = 'dashboard.html', 600);
            } else {
                showToast('Check email', 'Verification sent. Sign in after confirming.', 'success');
                setMode('login'); submitBtn.disabled = false; submitBtn.textContent = orig;
            }
        }
    } catch(err) { showToast('Error', err.message, 'error'); submitBtn.disabled = false; submitBtn.textContent = orig; }
});

function showToast(title, desc, type) {
    const t = document.createElement('div'); t.className = 'toast';
    const ic = type==='success' ? `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`
        : type==='error' ? `<svg class="toast-icon toast-icon-error" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
        : `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`;
    t.innerHTML = `${ic}<div class="toast-body"><div class="toast-title">${title}</div><div class="toast-desc">${desc}</div></div><button class="toast-close"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
    toastContainer.appendChild(t);
    const d = () => t.remove(); setTimeout(d, 4000);
    t.querySelector('.toast-close').addEventListener('click', d);
}
</script>
</body>
</html>
